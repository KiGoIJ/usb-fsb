<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Форма Р-01</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        if (localStorage.getItem('auth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <header>
        <div class="header-brand">
            <img src="assets/emblem.png" alt="Эмблема" class="emblem-small" onerror="this.style.display='none'">
            <span>Форма Р-01 «Сигнал»</span>
        </div>
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> На главную</a>
    </header>
    <main>
        <h2 style="color:var(--accent); margin-bottom:20px;">РЕГИСТРАЦИЯ СООБЩЕНИЯ О ПРОИСШЕСТВИИ</h2>
        <form id="reportForm" class="card">
            <label>Позывной заявителя:</label>
            <input type="text" id="applicant" required>
            
            <label>Дата и время происшествия:</label>
            <input type="datetime-local" id="incidentTime" required>
            
            <label>Место:</label>
            <input type="text" id="place" required>
            
            <label>Краткое описание:</label>
            <textarea id="description" rows="4" required></textarea>
            
            <label>Участники/фигуранты:</label>
            <input type="text" id="persons">
            
            <label>Принятые меры:</label>
            <textarea id="measures" rows="3"></textarea>
            
            <button type="submit"><i class="fa-solid fa-paper-plane"></i> ОТПРАВИТЬ РАПОРТ</button>
        </form>
        <div id="successMsg" style="display:none; color:var(--success); margin-top:20px; text-align:center;"></div>
    </main>
    <script src="script.js"></script>
    <script>
        document.getElementById('reportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const report = {
                id: generateKRSP(),
                date: new Date().toISOString(),
                applicant: document.getElementById('applicant').value,
                incidentTime: document.getElementById('incidentTime').value,
                place: document.getElementById('place').value,
                description: document.getElementById('description').value,
                persons: document.getElementById('persons').value,
                measures: document.getElementById('measures').value,
                status: 'Зарегистрирован'
            };
            saveReport(report);
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('successMsg').textContent = `Рапорт зарегистрирован под номером ${report.id}`;
            this.reset();
            setTimeout(() => {
                document.getElementById('successMsg').style.display = 'none';
            }, 5000);
        });
    </script>
</body>
</html>
