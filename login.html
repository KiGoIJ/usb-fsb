<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Щит-М – Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-bg"></div>
    <div class="login-box">
        <img src="assets/emblem.png" alt="Эмблема" class="emblem" onerror="this.style.display='none'">
        <h2>АВТОМАТИЗИРОВАННАЯ<br>СИСТЕМА<br>УСБ УФСБ «ЦИТ-М»</h2>
        <div style="position:relative; margin: 15px 0;">
            <i class="fa-solid fa-user" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--accent);"></i>
            <input type="text" id="callsign" placeholder="Позывной" style="padding-left:40px;">
        </div>
        <div style="position:relative; margin: 15px 0;">
            <i class="fa-solid fa-lock" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--accent);"></i>
            <input type="password" id="password" placeholder="Пароль" style="padding-left:40px;">
        </div>
        <button onclick="login()">ВОЙТИ</button>
        <p id="error" style="color:var(--danger); margin-top:10px;"></p>
        <p style="margin-top:15px;"><a href="register.html" style="color:var(--accent);">Регистрация нового сотрудника</a></p>
    </div>
    <script src="script.js"></script>
    <script>
        function login() {
            const callsign = document.getElementById('callsign').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('error');
            if (!callsign || !password) {
                errorEl.textContent = 'Введите позывной и пароль';
                return;
            }
            const users = getUsers();
            const user = users.find(u => u.callsign === callsign && u.password === password);
            if (user) {
                localStorage.setItem('auth', 'true');
                localStorage.setItem('callsign', callsign);
                localStorage.setItem('isAdmin', user.role === 'admin' ? 'true' : 'false');
                window.location.href = 'index.html';
            } else {
                errorEl.textContent = 'Неверный позывной или пароль';
            }
        }
    </script>
</body>
</html>
