<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Щит-М – Главная</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        if (localStorage.getItem('auth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <header>
        <div class="header-brand">
            <img src="assets/emblem.png" alt="Эмблема" class="emblem-small" onerror="this.style.display='none'">
            <span>АС УСБ «Щит-М» | Сотрудник: <strong id="userDisplay"></strong></span>
        </div>
        <a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Выход</a>
    </header>
    <main class="dashboard">
        <h1>РАБОЧИЙ СТОЛ ОПЕРАТИВНИКА</h1>
        <div class="menu-grid">
            <a href="report.html" class="menu-card">
                <i class="fa-solid fa-file-circle-exclamation"></i>
                <span>Подать рапорт</span>
                <small>Форма Р-01 «Сигнал»</small>
            </a>
            <a href="check.html" class="menu-card">
                <i class="fa-solid fa-magnifying-glass-chart"></i>
                <span>Запросить проверку</span>
                <small>Форма ЗП-02</small>
            </a>
            <a href="registry.html" class="menu-card">
                <i class="fa-solid fa-database"></i>
                <span>Реестр КРСП</span>
                <small>Все обращения</small>
            </a>
            <a href="analytics.html" class="menu-card">
                <i class="fa-solid fa-chart-line"></i>
                <span>Аналитика</span>
                <small>Сводки и угрозы</small>
            </a>
        </div>
        <div class="current-time" id="timeDisplay"></div>
    </main>
    <script>
        document.getElementById('userDisplay').textContent = localStorage.getItem('callsign') || 'Неизвестный';
        function logout() {
            localStorage.removeItem('auth');
            localStorage.removeItem('callsign');
            window.location.href = 'login.html';
        }
        setInterval(() => {
            document.getElementById('timeDisplay').textContent = new Date().toLocaleString('ru-RU');
        }, 1000);
    </script>
</body>
</html>
