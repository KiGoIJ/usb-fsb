<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Щит-М – Главная</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        if (localStorage.getItem('auth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <header>
        <img src="assets/emblem.png" alt="Эмблема" class="emblem-small">
        <span>АС УСБ «Щит-М» | Сотрудник: <strong id="userDisplay"></strong></span>
        <a href="#" onclick="logout()">Выход</a>
    </header>
    <main class="dashboard">
        <h1>РАБОЧИЙ СТОЛ ОПЕРАТИВНИКА</h1>
        <div class="menu-grid">
            <a href="report.html" class="menu-card">📝 Подать рапорт (форма Р-01)</a>
            <a href="check.html" class="menu-card">📁 Запросить проверку (ЗП-02)</a>
            <a href="registry.html" class="menu-card">📇 Реестр КРСП</a>
            <a href="analytics.html" class="menu-card">📊 Аналитика</a>
        </div>
        <div class="current-time" id="timeDisplay"></div>
    </main>
    <script>
        document.getElementById('userDisplay').textContent = localStorage.getItem('callsign') || 'Неизвестный';
        function logout() {
            localStorage.removeItem('auth');
            localStorage.removeItem('callsign');
            window.location.href = 'login.html';
        }
        setInterval(() => {
            document.getElementById('timeDisplay').textContent = new Date().toLocaleString('ru-RU');
        }, 1000);
    </script>
</body>
</html>
