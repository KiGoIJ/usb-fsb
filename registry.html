<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Реестр КРСП</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        if (localStorage.getItem('auth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <header>
        <div class="header-brand">
            <img src="assets/emblem.png" alt="Эмблема" class="emblem-small" onerror="this.style.display='none'">
            <span>Реестр сообщений (КРСП) и проверок</span>
        </div>
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> На главную</a>
    </header>
    <main>
        <h2 style="color:var(--accent); margin-bottom:20px;">РЕЕСТР ЗАРЕГИСТРИРОВАННЫХ ОБРАЩЕНИЙ</h2>
        <div style="overflow-x:auto;">
            <table id="registryTable">
                <thead>
                    <tr>
                        <th>Номер</th>
                        <th>Дата</th>
                        <th>Тип</th>
                        <th>Заявитель</th>
                        <th>Суть</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
    <script src="script.js"></script>
    <script>
        function loadRegistry() {
            const reports = JSON.parse(localStorage.getItem('reports') || '[]');
            const checks = JSON.parse(localStorage.getItem('checks') || '[]');
            const tbody = document.querySelector('#registryTable tbody');
            tbody.innerHTML = '';

            reports.forEach((r, index) => {
                const row = tbody.insertRow();
                const statusClass = r.status === 'Зарегистрирован' ? 'registered' : (r.status === 'В работе' ? 'in-progress' : 'completed');
                row.innerHTML = `
                    <td><strong>${r.id}</strong></td>
                    <td>${new Date(r.date).toLocaleString('ru-RU')}</td>
                    <td>Рапорт</td>
                    <td>${r.applicant}</td>
                    <td>${r.description.substring(0, 50)}...</td>
                    <td><span class="status-badge ${statusClass}">${r.status}</span></td>
                    <td>
                        <button class="btn small" onclick="updateStatus('reports', ${index}, prompt('Новый статус: Зарегистрирован, В работе, Завершён', '${r.status}'))"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn danger small" onclick="deleteItem('reports', ${index})"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
            });

            checks.forEach((c, index) => {
                const row = tbody.insertRow();
                const statusClass = c.status === 'На рассмотрении' ? 'in-progress' : (c.status === 'Утверждён' ? 'completed' : 'registered');
                row.innerHTML = `
                    <td><strong>${c.id}</strong></td>
                    <td>${new Date().toLocaleString('ru-RU')}</td>
                    <td>Запрос</td>
                    <td>${c.initiator}</td>
                    <td>${c.reason.substring(0, 50)}...</td>
                    <td><span class="status-badge ${statusClass}">${c.status}</span></td>
                    <td>
                        <button class="btn small" onclick="updateCheckStatus(${index}, prompt('Новый статус: На рассмотрении, Утверждён, Отклонён', '${c.status}'))"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn danger small" onclick="deleteCheck(${index})"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
            });
        }

        window.onload = loadRegistry;
    </script>
</body>
</html>
