<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Консоль управления</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        if (localStorage.getItem('auth') !== 'true' || localStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>
    <header>
        <div class="header-brand">
            <img src="assets/emblem.png" alt="Эмблема" class="emblem-small" onerror="this.style.display='none'">
            <span>Консоль администратора</span>
        </div>
        <div>
            <a href="index.html"><i class="fa-solid fa-house"></i> Главная</a>
            <a href="#" onclick="logout()" style="margin-left:15px;"><i class="fa-solid fa-right-from-bracket"></i> Выйти</a>
        </div>
    </header>

    <main style="padding: 30px 20px; max-width: 1200px; margin:0 auto;">
        <h1 style="color:var(--accent); margin-bottom:20px;">🛠️ Панель управления</h1>

        <!-- Вкладки -->
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button class="btn" onclick="showTab('users')">Пользователи</button>
            <button class="btn" onclick="showTab('topics')">Темы</button>
            <button class="btn" onclick="showTab('reports')">Рапорты</button>
        </div>

        <!-- Контент вкладок -->
        <div id="tabUsers" class="tab-content">
            <h2 style="color:var(--accent);">👥 Управление пользователями</h2>
            <div id="usersList"></div>
        </div>
        <div id="tabTopics" class="tab-content" style="display:none;">
            <h2 style="color:var(--accent);">📋 Управление темами</h2>
            <div id="topicsList"></div>
        </div>
        <div id="tabReports" class="tab-content" style="display:none;">
            <h2 style="color:var(--accent);">📄 Управление рапортами</h2>
            <div id="reportsList"></div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).style.display = 'block';
            if (tab === 'users') renderUsers();
            if (tab === 'topics') renderTopics();
            if (tab === 'reports') renderReports();
        }

        // ===== ПОЛЬЗОВАТЕЛИ =====
        function renderUsers() {
            const users = getUsers();
            const container = document.getElementById('usersList');
            if (users.length === 0) {
                container.innerHTML = '<p>Нет пользователей</p>';
                return;
            }
            let html = '<table><thead><tr><th>Позывной</th><th>Звание</th><th>Роль</th><th>Действия</th></tr></thead><tbody>';
            users.forEach(u => {
                const isAdmin = u.role === 'admin';
                html += `<tr>
                    <td>${escapeHtml(u.callsign)}</td>
                    <td>${escapeHtml(u.rank || 'Рядовой')}</td>
                    <td>${isAdmin ? 'Администратор' : 'Пользователь'}</td>
                    <td>
                        ${!isAdmin ? `<button class="btn small" onclick="makeAdmin('${u.callsign}')">Сделать админом</button>` : `<button class="btn small" onclick="removeAdmin('${u.callsign}')">Снять админа</button>`}
                        <button class="btn danger small" onclick="deleteUserAccount('${u.callsign}')">Удалить</button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function makeAdmin(callsign) {
            if (confirm(`Назначить ${callsign} администратором?`)) {
                setUserRole(callsign, 'admin');
                renderUsers();
            }
        }

        function removeAdmin(callsign) {
            if (confirm(`Снять роль администратора с ${callsign}?`)) {
                setUserRole(callsign, 'user');
                renderUsers();
            }
        }

        function deleteUserAccount(callsign) {
            if (confirm(`Удалить пользователя ${callsign}?`)) {
                deleteUser(callsign);
                renderUsers();
            }
        }

        // ===== ТЕМЫ =====
        function renderTopics() {
            const topics = getTopics();
            const container = document.getElementById('topicsList');
            if (topics.length === 0) {
                container.innerHTML = '<p>Нет тем</p>';
                return;
            }
            let html = '<table><thead><tr><th>ID</th><th>Заголовок</th><th>Автор</th><th>Дата</th><th>Действия</th></tr></thead><tbody>';
            topics.sort((a, b) => new Date(b.date) - new Date(a.date));
            topics.forEach(t => {
                html += `<tr>
                    <td>${t.id}</td>
                    <td>${escapeHtml(t.title)}</td>
                    <td>${escapeHtml(t.author)}</td>
                    <td>${new Date(t.date).toLocaleString('ru-RU')}</td>
                    <td>
                        <button class="btn danger small" onclick="deleteTopicAdmin(${t.id})">Удалить</button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function deleteTopicAdmin(topicId) {
            if (confirm('Удалить тему и все сообщения в ней?')) {
                deleteTopic(topicId);
                renderTopics();
            }
        }

        // ===== РАПОРТЫ =====
        function renderReports() {
            const reports = getReports();
            const container = document.getElementById('reportsList');
            if (reports.length === 0) {
                container.innerHTML = '<p>Нет рапортов</p>';
                return;
            }
            let html = '<table><thead><tr><th>№</th><th>Тема</th><th>Автор</th><th>Дата</th><th>Статус</th><th>Действия</th></tr></thead><tbody>';
            reports.sort((a, b) => new Date(b.date) - new Date(a.date));
            reports.forEach(r => {
                html += `<tr>
                    <td>${r.id}</td>
                    <td>${escapeHtml(r.subject)}</td>
                    <td>${escapeHtml(r.author)}</td>
                    <td>${new Date(r.date).toLocaleString('ru-RU')}</td>
                    <td><span class="status-badge ${r.status === 'одобрен' ? 'completed' : r.status === 'отклонён' ? 'registered' : 'in-progress'}">${r.status}</span></td>
                    <td>
                        <button class="btn small" onclick="changeReportStatusAdmin('${r.id}', 'на рассмотрении')">На рассмотрении</button>
                        <button class="btn small" onclick="changeReportStatusAdmin('${r.id}', 'одобрен')">Одобрить</button>
                        <button class="btn small" onclick="changeReportStatusAdmin('${r.id}', 'отклонён')">Отклонить</button>
                        <button class="btn danger small" onclick="deleteReportAdmin('${r.id}')">Удалить</button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function changeReportStatusAdmin(reportId, status) {
            if (confirm(`Изменить статус рапорта на "${status}"?`)) {
                changeReportStatus(reportId, status);
                renderReports();
            }
        }

        function deleteReportAdmin(reportId) {
            if (confirm('Удалить рапорт?')) {
                deleteReport(reportId);
                renderReports();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // По умолчанию показываем вкладку пользователей
        window.onload = function() {
            showTab('users');
        };
    </script>
</body>
</html>
