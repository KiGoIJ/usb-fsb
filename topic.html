<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Тема форума</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        if (localStorage.getItem('auth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <header>
        <div class="header-brand">
            <img src="assets/emblem.png" alt="Эмблема" class="emblem-small" onerror="this.style.display='none'">
            <span>Просмотр темы</span>
        </div>
        <div>
            <span style="margin-right:16px; color:var(--text-dim);">
                Сотрудник: <strong id="userDisplay" style="color:var(--text-primary);"></strong>
                <span id="rankDisplay" style="color:var(--accent); font-weight:500; margin-left:6px;"></span>
                <span id="positionDisplay" style="color:var(--text-secondary); font-weight:400; margin-left:8px; font-size:0.85rem;"></span>
            </span>
            <a href="forum.html"><i class="fa-solid fa-arrow-left"></i> Назад</a>
        </div>
    </header>

    <main style="padding: 30px 20px; max-width: 900px; margin:0 auto;">
        <div id="topicHeader" class="card" style="margin-bottom:20px;"></div>
        <div id="postsContainer"></div>

        <div class="card" style="margin-top:30px;">
            <h3 style="color:var(--accent);">💬 Добавить ответ</h3>
            <form id="replyForm">
                <textarea id="replyText" rows="4" required placeholder="Ваш ответ..."></textarea>
                <button type="submit"><i class="fa-solid fa-reply"></i> Ответить</button>
            </form>
        </div>
        <div id="replyMsg" style="display:none; margin-top:10px; color:var(--success); text-align:center;"></div>
    </main>

    <script src="script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const topicId = parseInt(urlParams.get('id'));
        if (!topicId) {
            alert('Неверный идентификатор темы');
            window.location.href = 'forum.html';
        }

        const callsign = localStorage.getItem('callsign') || 'Неизвестный';
        document.getElementById('userDisplay').textContent = callsign;
        document.getElementById('rankDisplay').textContent = '[' + getRank(callsign) + ']';
        document.getElementById('positionDisplay').textContent = getPosition(callsign);

        function renderTopic() {
            const topic = getTopicById(topicId);
            if (!topic) {
                document.getElementById('topicHeader').innerHTML = '<p style="color:var(--danger);">Тема не найдена</p>';
                return;
            }

            const authorRank = getRank(topic.author);
            const authorPosition = getPosition(topic.author);
            const category = getCategoryById(topic.category);
            const categoryName = category ? category.icon + ' ' + category.name : 'Без категории';

            document.getElementById('topicHeader').innerHTML = `
                <h2 style="color:var(--accent);">${escapeHtml(topic.title)}</h2>
                <p><strong>Категория:</strong> ${categoryName}</p>
                <p><strong>Автор:</strong> ${escapeHtml(authorRank)} ${escapeHtml(topic.author)} 
                <span style="color:var(--text-secondary); font-size:0.85rem;">${escapeHtml(authorPosition)}</span>
                &nbsp;|&nbsp; <strong>Создано:</strong> ${new Date(topic.date).toLocaleString('ru-RU')}</p>
                <p><strong>Ответов:</strong> ${topic.postCount}</p>
            `;

            const posts = getPostsByTopic(topicId);
            const container = document.getElementById('postsContainer');
            container.innerHTML = '';
            if (posts.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-dim);">Нет сообщений</p>';
            } else {
                posts.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.style.marginBottom = '15px';
                    const postAuthorRank = getRank(p.author);
                    const postPosition = getPosition(p.author);
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; color:var(--text-dim); font-size:0.9rem;">
                            <span>
                                <strong style="color:var(--text-primary);">${escapeHtml(postAuthorRank)} ${escapeHtml(p.author)}</strong>
                                <span style="color:var(--text-secondary); font-size:0.8rem; margin-left:8px;">${escapeHtml(postPosition)}</span>
                            </span>
                            <span>${new Date(p.date).toLocaleString('ru-RU')}</span>
                        </div>
                        <div style="margin-top:8px; white-space:pre-wrap;">${escapeHtml(p.text)}</div>
                    `;
                    container.appendChild(div);
                });
            }
        }

        document.getElementById('replyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const text = document.getElementById('replyText').value.trim();
            if (!text) return;
            const author = localStorage.getItem('callsign') || 'Аноним';
            addPost(topicId, text, author);
            document.getElementById('replyText').value = '';
            document.getElementById('replyMsg').style.display = 'block';
            document.getElementById('replyMsg').textContent = 'Ответ добавлен!';
            setTimeout(() => {
                document.getElementById('replyMsg').style.display = 'none';
            }, 3000);
            renderTopic();
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.onload = renderTopic;
    </script>
</body>
</html>
