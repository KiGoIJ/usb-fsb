<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Новая тема</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        if (localStorage.getItem('auth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <header>
        <div class="header-brand">
            <img src="assets/emblem.png" alt="Эмблема" class="emblem-small" onerror="this.style.display='none'">
            <span>Создание новой темы</span>
        </div>
        <a href="forum.html"><i class="fa-solid fa-arrow-left"></i> Назад</a>
    </header>

    <main style="padding: 30px 20px; max-width: 800px; margin:0 auto;">
        <h2 style="color:var(--accent); margin-bottom:20px;">✏️ Новая тема</h2>
        <form id="newTopicForm" class="card">
            <label>Категория:</label>
            <select id="topicCategory" required>
                <option value="">Выберите категорию</option>
            </select>

            <label>Заголовок темы:</label>
            <input type="text" id="topicTitle" required>

            <label>Текст сообщения:</label>
            <textarea id="topicText" rows="6" required></textarea>

            <button type="submit"><i class="fa-solid fa-paper-plane"></i> Опубликовать</button>
        </form>
    </main>

    <script src="script.js"></script>
    <script>
        // Загружаем категории в выпадающий список
        const categories = getCategories();
        const select = document.getElementById('topicCategory');
        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat.id;
            option.textContent = cat.icon + ' ' + cat.name;
            select.appendChild(option);
        });

        document.getElementById('newTopicForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const category = document.getElementById('topicCategory').value;
            const title = document.getElementById('topicTitle').value.trim();
            const text = document.getElementById('topicText').value.trim();
            const author = localStorage.getItem('callsign') || 'Аноним';

            if (!category || !title || !text) {
                alert('Заполните все поля');
                return;
            }

            const topicId = createTopic(title, text, author, category);
            window.location.href = `topic.html?id=${topicId}`;
        });
    </script>
</body>
</html>
