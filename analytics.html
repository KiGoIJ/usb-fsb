<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Аналитика – Щит-М</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        if (localStorage.getItem('auth') !== 'true') { window.location.href = 'login.html'; }
    </script>
    <header>
        <div class="header-brand">
            <img src="assets/emblem.png" alt="Эмблема" class="emblem-small" onerror="this.style.display='none'">
            <span>АС УСБ «Щит-М» | Аналитический отдел</span>
        </div>
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> На главную</a>
    </header>
    <main>
        <h1 style="color: var(--accent); text-align: center; margin: 30px 0;">📊 АНАЛИТИЧЕСКАЯ СВОДКА</h1>
        <div id="stats"></div>
    </main>
    <script src="script.js"></script>
    <script>
        function showStats() {
            const reports = JSON.parse(localStorage.getItem('reports') || '[]');
            const checks = JSON.parse(localStorage.getItem('checks') || '[]');
            const total = reports.length + checks.length;
            const openReports = reports.filter(r => r.status !== 'Завершён').length;
            const pendingChecks = checks.filter(c => c.status === 'На рассмотрении').length;

            document.getElementById('stats').innerHTML = `
                <div class="menu-grid">
                    <div class="card" style="text-align:center">
                        <i class="fa-solid fa-folder-open" style="font-size:2rem; color:var(--accent);"></i>
                        <h3>${total}</h3>
                        <p>Всего обращений</p>
                    </div>
                    <div class="card" style="text-align:center">
                        <i class="fa-solid fa-clock" style="font-size:2rem; color:#ffb703;"></i>
                        <h3>${openReports}</h3>
                        <p>Активных рапортов</p>
                    </div>
                    <div class="card" style="text-align:center">
                        <i class="fa-solid fa-hourglass-half" style="font-size:2rem; color:#ffb703;"></i>
                        <h3>${pendingChecks}</h3>
                        <p>Запросов на проверку</p>
                    </div>
                </div>
                <div class="card" style="margin-top:30px">
                    <h3>Последние действия</h3>
                    <div id="log"></div>
                </div>
            `;
            const all = [...reports.map(r => ({time: r.date, text: `Рапорт ${r.id} от ${r.applicant}`})),
                        ...checks.map(c => ({time: new Date().toISOString(), text: `Запрос проверки ${c.id} от ${c.initiator}`}))];
            all.sort((a,b) => (b.time > a.time ? 1 : -1));
            const logDiv = document.getElementById('log');
            all.slice(0,5).forEach(item => {
                const p = document.createElement('p');
                p.textContent = item.text;
                logDiv.appendChild(p);
            });
        }
        window.onload = showStats;
    </script>
</body>
</html>
